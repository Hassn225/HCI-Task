<!DOCTYPE html>
<html>
<head>
<title>Payment Form</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:400px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

h2{
    text-align:center;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Payment Form</h2>

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Address</label>
<textarea placeholder="Enter your address"></textarea>

<label>City Name</label>
<input type="text" placeholder="Enter city name">

<label>Payment Method</label>
<select>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Cash on Delivery</option>
</select>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
